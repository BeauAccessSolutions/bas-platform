# BAS accessible login theme — WCAG 2.2 AA.
#
# Extends Keycloak 26's DEFAULT login theme (keycloak.v2 / PatternFly v5), which
# is the theme Keycloak actually renders. A CSS-only override (no template/.ftl
# copies) so it survives Keycloak version bumps and keeps every built-in i18n
# message bundle intact (platform invariant #5 — no hardcoded strings).
#
# `styles` is REPLACED (not merged) by a child theme, so we relist the parent's
# css/styles.css and append bas-a11y.css after it — last stylesheet wins.
# `stylesCommon` (the PatternFly v5 vendor CSS) is inherited from the parent and
# must NOT be redeclared, or the base layout would lose PatternFly entirely.
parent=keycloak.v2
import=common/keycloak
styles=css/styles.css css/bas-a11y.css
# One small script: guarantee html[lang] for WCAG 3.1.1 (see js/bas-a11y.js).
# The parent theme sets no `scripts`, so this is purely additive.
scripts=js/bas-a11y.js
