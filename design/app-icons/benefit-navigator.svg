<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Benefit Navigator — modern combat helmet (ACH/PASGT), side profile.
       Modern read = SQUAT, wide, deep dome with near-vertical lower sides and
       a tight rim hugging the shell (vs the M1's tall bowl + flared brim),
       plus the multi-point chinstrap harness. Gold star on the shell. -->
  <rect width="1024" height="1024" fill="#20355E"/>

  <!-- chinstrap harness (hangs below the rim) -->
  <g stroke="#CFC7B4" stroke-width="24" fill="none" stroke-linecap="round">
    <path d="M 300 674 L 294 746"/>
    <path d="M 724 674 L 730 746"/>
    <path d="M 294 746 C 342 802, 682 802, 730 746"/>
  </g>
  <rect x="470" y="760" width="118" height="48" rx="16" fill="#CFC7B4"/>

  <!-- shell: squat wide dome, near-vertical lower sides -->
  <path d="M 512 272
           C 316 272, 178 400, 174 556
           L 172 628
           L 852 628
           L 850 556
           C 846 400, 708 272, 512 272 Z" fill="#F5F1E8"/>

  <!-- rim: tight level band hugging the shell, shadowed underside -->
  <rect x="162" y="620" width="700" height="50" rx="25" fill="#F5F1E8"/>
  <path d="M 162 646 C 162 660, 174 670, 188 670 L 836 670
           C 850 670, 862 660, 862 646 Z" fill="#CFC7B4"/>

  <!-- gold star -->
  <path d="M 512 354 L 529.6 405.7 L 584.3 406.5 L 540.5 439.3 L 556.7 491.5
           L 512 460 L 467.3 491.5 L 483.5 439.3 L 439.7 406.5 L 494.4 405.7 Z"
        fill="#E8B44A"/>
</svg>
